services:
  hcc-dashboard:
    build: .
    container_name: hcc-dashboard
    restart: unless-stopped
    ports:
      - "3080:3080"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
