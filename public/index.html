<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HCC // DASHBOARD</title>
    <link rel="stylesheet" href="/css/hcc.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Header HUD -->
    <header id="hcc-header">
        <div class="header-left">
            <div class="status-dot green"></div>
            <span class="status-label" style="color:var(--green);">ONLINE</span>
            <div class="header-divider"></div>
            <div class="status-dot cyan" id="hcc-poll-dot"></div>
            <span class="status-label" style="color:var(--cyan);">HCC</span>
            <div class="header-divider"></div>
            <span id="hcc-services-count" style="color:var(--text-muted);font-size:0.7rem;letter-spacing:2px;">---</span>
        </div>
        <div class="header-center">
            <div id="hcc-clock">--:--:--</div>
            <div id="hcc-date">---</div>
        </div>
        <div class="header-right">
            <span style="color:var(--orange);letter-spacing:3px;font-weight:700;font-size:0.75rem;">SESSION</span>
            <span id="hcc-session" style="color:var(--orange);font-weight:800;letter-spacing:3px;">00:00</span>
            <div class="header-divider"></div>
            <span class="hostname-badge">HCC-DASHBOARD</span>
        </div>
    </header>

    <!-- Dashboard Grid -->
    <main id="hcc-grid">
        <section class="hcc-panel" id="panel-overview">
            <div class="hcc-panel-header"><div class="dot"></div>SYSTEM OVERVIEW</div>
            <div class="hcc-panel-body" id="overview-body"><div class="panel-loading">CONNECTING...</div></div>
        </section>

        <section class="hcc-panel" id="panel-router">
            <div class="hcc-panel-header"><div class="dot"></div>ROUTER — RB3011</div>
            <div class="hcc-panel-body" id="router-body"><div class="panel-loading">CONNECTING...</div></div>
        </section>

        <section class="hcc-panel" id="panel-pihole">
            <div class="hcc-panel-header"><div class="dot"></div>PI-HOLE DNS</div>
            <div class="hcc-panel-body" id="pihole-body"><div class="panel-loading">CONNECTING...</div></div>
        </section>

        <section class="hcc-panel" id="panel-servers">
            <div class="hcc-panel-header"><div class="dot"></div>SERVER HEALTH</div>
            <div class="hcc-panel-body" id="servers-body"><div class="panel-loading">CONNECTING...</div></div>
        </section>

        <section class="hcc-panel" id="panel-netwatch">
            <div class="hcc-panel-header"><div class="dot"></div>NETWATCH — <span id="netwatch-count">0</span> HOSTS</div>
            <div class="hcc-panel-body" id="netwatch-body"><div class="panel-loading">CONNECTING...</div></div>
        </section>

        <section class="hcc-panel" id="panel-targets">
            <div class="hcc-panel-header"><div class="dot"></div>PROMETHEUS TARGETS</div>
            <div class="hcc-panel-body" id="targets-body"><div class="panel-loading">CONNECTING...</div></div>
        </section>

        <section class="hcc-panel span-full" id="panel-links">
            <div class="hcc-panel-header"><div class="dot"></div>QUICK LINKS</div>
            <div class="hcc-panel-body" id="links-body"><div class="panel-loading">CONNECTING...</div></div>
        </section>
    </main>

    <div id="particle-bg"></div>
    <script src="/js/effects.js"></script>
    <script src="/js/dashboard.js"></script>
</body>
</html>
